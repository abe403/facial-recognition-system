name: FaceGym CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Backend Unit Tests ──────────────────────────────────────
  backend-tests:
    name: "🐍 Backend Unit Tests (pytest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies (OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt httpx

      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # ── 2. Frontend Build ──────────────────────────────────────────
  frontend-build:
    name: "🅰️ Angular Production Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular app
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: frontend/dist/
          retention-days: 7

  # ── 3. Docker Build Validation ────────────────────────────────
  docker-build:
    name: "🐳 Docker Build Check"
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: facegym-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: facegym-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. E2E API Tests (Playwright) ─────────────────────────────
  e2e-tests:
    name: "🎭 E2E API Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: |
          docker compose up -d --build
          echo "Waiting for services to be ready..."
          # Poll the new public health endpoint; fail with diagnostics if not ready in 120s
          timeout 120 bash -c 'until curl -vfsS http://localhost:3001/api/health; do sleep 3; done' || {
            echo "❌ Service did not become ready in time. Dumping diagnostics..."
            docker compose ps
            docker compose logs --no-color --tail=300
            exit 1
          }

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Install Playwright
        working-directory: tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: tests
        env:
          API_BASE_URL: http://localhost:3001
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose down
